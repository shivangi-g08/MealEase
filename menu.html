<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MealEase Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/main.css">
<link rel="stylesheet" href="assets/css/menu.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="brand">
    <span class="brand-mark">🍽️</span>
    <div>
      <h2 class="logo-text">MealEase</h2>
      <p class="logo-subtitle">Fresh meals, faster pickup</p>
    </div>
  </div>

  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="cart.html" class="cart-link">Cart <span id="cartCount" class="cart-count">0</span></a>
    <button onclick="logout()" class="btn logout-btn">Logout</button>
  </div>
</nav>

<!-- HEADER -->
<section class="menu-header">
  <h1>Explore Menu</h1>
  <p>Pre-order your favorite meals and skip the queue</p>
</section>

<!-- CONTROLS -->
<div class="menu-controls">

  <!-- SEARCH -->
  <input 
    type="text" 
    id="search" 
    placeholder="Search food, drinks, or meals..." 
    class="search"
  >

  <div class="controls-right">
    <!-- FILTERS -->
    <div class="filters">
      <button onclick="filterType('all',this)" class="filter active">All</button>
      <button onclick="filterType('veg',this)" class="filter">Veg</button>
      <button onclick="filterType('nonveg',this)" class="filter">Non-Veg</button>
    </div>
  </div>

</div>

<p id="resultInfo" class="result-info">Showing all menu items</p>

<!-- MENU GRID -->
<div id="menu" class="menu-grid"></div>

<!-- TOAST -->
<div id="toast" class="toast">Item added to cart</div>

<!-- JS -->
<script src="assets/js/main.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/menu.js"></script>

</body>
</html>
